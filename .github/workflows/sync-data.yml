name: Weekly Scryfall Sync
on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight
  workflow_dispatch: # Allows manual triggering for testing

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'data-preprocessor/package-lock.json'

      - name: Install Dependencies
        run: |
          cd data-preprocessor
          npm ci

      - name: Create dist directory
        run: mkdir -p dist

      - name: Download Existing Manifest
        run: |
          aws s3 cp s3://mtg-deckbuilder-data/manifest.json dist/manifest.json --endpoint-url $AWS_S3_ENDPOINT || echo "No existing manifest.json found, starting fresh."
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: ${{ secrets.R2_ENDPOINT_URL }}

      - name: Fetch Scryfall Bulk Metadata and Download raw-default-cards.json
        run: |
          BULK_URL=$(curl -s https://api.scryfall.com/bulk-data | jq -r '.data[] | select(.type=="default_cards") | .download_uri')
          curl -L -o raw-default-cards.json "$BULK_URL"

      - name: Run Preprocessor Utility
        run: node data-preprocessor/build-database.mjs raw-default-cards.json dist

      - name: Compress Data Files with Brotli
        run: |
          brotli -q 9 -o dist/cards.json.br dist/cards.json
          for f in dist/prices_*.json; do brotli -q 9 -o "${f}.br" "$f"; done

      - name: Upload Compressed Data Files to R2
        # Upload .br files with correct Content-Encoding so browsers auto-decompress
        run: |
          for f in dist/*.br; do
            key=$(basename "$f" .br)
            aws s3 cp "$f" "s3://mtg-deckbuilder-data/$key" \
              --endpoint-url $AWS_S3_ENDPOINT \
              --content-encoding br \
              --content-type application/json \
              --acl public-read
          done
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: ${{ secrets.R2_ENDPOINT_URL }}

      - name: Upload Manifest to R2
        # manifest.json is tiny — upload uncompressed so it always loads fast
        run: |
          aws s3 cp dist/manifest.json s3://mtg-deckbuilder-data/manifest.json \
            --endpoint-url $AWS_S3_ENDPOINT \
            --content-type application/json \
            --acl public-read
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: ${{ secrets.R2_ENDPOINT_URL }}
